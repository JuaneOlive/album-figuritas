version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: album-mundial-db
    environment:
      POSTGRES_USER: album_user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: album_mundial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U album_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación (Node.js)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: album-mundial-app
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: album_mundial
      DB_USER: album_user
      DB_PASSWORD: postgres
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # Staging (opcional)
  app-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: album-mundial-staging
    environment:
      NODE_ENV: staging
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: album_mundial_staging
      DB_USER: album_user
      DB_PASSWORD: postgres
      CORS_ORIGIN: http://localhost:3001
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm start

volumes:
  postgres_data:
    driver: local
