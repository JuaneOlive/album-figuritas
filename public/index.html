<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Manejo de figuritas del mundial</h1>
  <h2>Gestioná tus figuritas</h2>

  <button id="loadStickersButton" type="button">Cargar figuritas</button>
  <button id="loadOwnedStickersButton" type="button">Cargar figuritas obtenidas</button>
  <button id="loadMissingStickersButton" type="button">Cargar figuritas faltantes</button>
  <button id="clearStickersButton" type="button">Limpiar figuritas</button>


  <table> 
    <thead>
      <tr>
        <th>CODIGO</th>
        <th>TIPO</th>
        <th>CANTIDAD</th>
      </tr>
    </thead>
    <tbody id="stickersTableBody">
    </tbody>
  </table>

  <br></br>
  
  <form id="addStickerForm">
    <select id="addStickerSelect" name="addStickerSelect">
      <option value="">Seleccione una figurita</option>
    </select>
    <button id="addStickerButton" type="button">Agregar figurita</button>
    <button id="removeStickerButton" type="button">Quitar figurita</button>
  </form>

  <script src="app.js"></script>
</body>
</html>
